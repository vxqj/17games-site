<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>17Games</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="nav">
    <div class="nav-logo"><span class="hex-dot"></span><span data-site-name>17Games</span></div>
    <div class="nav-links">
      <button data-view="viewZones" class="active">Zones</button>
      <button data-view="viewStaff">Staff &amp; Credits</button>
      <button data-view="viewDevs">Developers</button>
    </div>
  </nav>

  <!-- ===================== ZONES ===================== -->
  <section id="viewZones" class="view active">
    <div class="hero">
      <span class="eyebrow">12 Zones &middot; 2 Rebirths &middot; 1 Secret</span>
      <h1>Every zone, every <span>hive</span>, one map.</h1>
      <p data-tagline>The unofficial atlas of every zone, hive & rebirth.</p>
      <div class="hero-stats" id="heroStats"></div>
    </div>

    <div class="path-wrap" id="zonePath"></div>
  </section>

  <!-- ===================== STAFF / CREDITS ===================== -->
  <section id="viewStaff" class="view">
    <div class="page-head">
      <span class="eyebrow">Credits</span>
      <h2>Management Team</h2>
      <p>The people running the hive.</p>
    </div>
    <div class="grid" id="staffGrid"></div>
  </section>

  <!-- ===================== DEVELOPERS ===================== -->
  <section id="viewDevs" class="view">
    <div class="page-head">
      <span class="eyebrow">Credits</span>
      <h2>Developers</h2>
      <p>The people building the hive.</p>
    </div>
    <div class="grid" id="devGrid"></div>
  </section>

  <footer class="site-footer">
    <span data-site-name>17Games</span> — built with <strong>🐝</strong> by the team above.
  </footer>

  <script src="config.js"></script>
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
