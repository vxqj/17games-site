<script src="js/config.js"></script>

<script src="js/main.js"></script>




<script>


const developerContainer = document.getElementById("developers-container");



CONFIG.developers.forEach(dev => {



const card = document.createElement("div");


card.className = "card developer-card";



card.innerHTML = `


<img
src="${dev.image}"
alt="${dev.username}"
class="profile-image"
>



<h3>
${dev.username}
</h3>



<p>
${dev.role}
</p>



`;



developerContainer.appendChild(card);



});



</script>
