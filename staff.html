<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>17Games | Staff</title>

<link rel="stylesheet" href="css/style.css">

</head>



<body>


<header class="navbar">


<div class="logo">

<h1>17Games</h1>

<p>Bee ReMastered</p>

</div>



<nav>

<a href="index">Home</a>

<a href="zones">Zones</a>

<a href="staff">Staff</a>

<a href="developers">Developers</a>

</nav>


</header>





<section class="page-header">


<h2>
17Games Management Team
</h2>


<p>
Meet the people who help run and manage Bee ReMastered.
</p>


</section>








<section class="team">


<div id="staff-container" class="card-container">

</div>


</section>








<footer>


<h3>
17Games
</h3>


<p>
© 2026 17Games. All Rights Reserved.
</p>


</footer>








<script src="js/config.js"></script>

<script src="js/main.js"></script>



<script>


const staffContainer = document.getElementById("staff-container");



CONFIG.staff.forEach(member => {



const card = document.createElement("div");


card.className = "card staff-card";



card.innerHTML = `

<img 
src="${member.image}" 
alt="${member.username}"
class="profile-image"
>


<h3>
${member.username}
</h3>


<p>
${member.role}
</p>


`;



staffContainer.appendChild(card);



});



</script>



</body>

</html>
